<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#F0444B" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#131215" media="(prefers-color-scheme: dark)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Мой Ребёнок">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<title>Мой Ребёнок</title>
<style>
:root{
  --red:#F0444B; --red-d:#D8363D; --red-l:#FF5D63;
  --red-soft:#FDEBEC; --red-soft-2:#FBDDDF; --red-tint:#FEF4F4;
  --bg:#FFF6F6; --surface:#FFFFFF; --surface-2:#FBF1F1; --surface-3:#F6E9E9;
  --text:#1B1B1F; --text-2:#6E6E73; --text-3:#A3A0A6;
  --border:#F1E5E5; --border-2:#EAD9D9;
  --green:#2FB97A; --green-d:#1E9A62; --green-soft:#E6F6EE;
  --amber:#EF9A3C; --amber-soft:#FDF1E1;
  --blue:#3B82C4; --blue-soft:#E8F1FA;
  --shadow-sm:0 2px 8px rgba(190,40,50,.06);
  --shadow:0 8px 24px rgba(190,40,50,.09);
  --shadow-lg:0 16px 40px rgba(190,40,50,.14);
  --shadow-fab:0 8px 22px rgba(240,68,75,.42);
  --r:22px; --r-md:16px; --r-sm:12px; --r-pill:999px;
  --nav-h:64px; --maxw:480px;
  --fs-h1:26px; --fs-h2:21px; --fs-h3:18px; --fs-body:16px; --fs-sm:14px; --fs-xs:12px;
  --ff:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans",sans-serif;
  --ease:cubic-bezier(.32,.72,0,1); --ease-spring:cubic-bezier(.34,1.56,.64,1);
}
[data-theme="dark"]{
  --red:#FF595F; --red-d:#E84A50; --red-l:#FF7177;
  --red-soft:#2C1A1C; --red-soft-2:#3A2024; --red-tint:#211719;
  --bg:#131215; --surface:#1D1B1F; --surface-2:#262229; --surface-3:#2F2A32;
  --text:#F4F2F5; --text-2:#B6B0B8; --text-3:#827C86;
  --border:#322D35; --border-2:#3C363F;
  --green:#34C77E; --green-d:#2BB06E; --green-soft:#15291E;
  --amber:#F2A857; --amber-soft:#2A2114;
  --blue:#5BA0DA; --blue-soft:#15212C;
  --shadow-sm:0 2px 8px rgba(0,0,0,.3);
  --shadow:0 8px 24px rgba(0,0,0,.4);
  --shadow-lg:0 16px 40px rgba(0,0,0,.55);
  --shadow-fab:0 8px 22px rgba(255,89,95,.4);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:var(--ff); font-size:var(--fs-body); line-height:1.45;
  color:var(--text); background:var(--bg);
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  overscroll-behavior-y:none; transition:background .35s var(--ease),color .35s var(--ease);
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:var(--fs-body);color:var(--text);outline:none;border:none;background:none}
img{display:block;max-width:100%}
svg{width:20px;height:20px;flex:none;vertical-align:middle}
.al svg{width:40px;height:40px;color:var(--red)}
.chart-svg{width:100%;height:auto}
::selection{background:var(--red-soft-2);color:var(--text)}
:focus-visible{outline:2px solid var(--red);outline-offset:2px;border-radius:6px}

/* ===== App shell ===== */
#app{max-width:var(--maxw);margin:0 auto;min-height:100%;position:relative;background:var(--bg);overflow-x:hidden}
.screen{display:none;min-height:100vh;min-height:100dvh;animation:fadeUp .32s var(--ease)}
.screen.active{display:block}
.screen.has-nav{padding-bottom:calc(var(--nav-h) + 26px + env(safe-area-inset-bottom))}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pop{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}

/* ===== App bar ===== */
.appbar{
  position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:6px;
  padding:calc(14px + env(safe-area-inset-top)) 18px 14px;
  background:color-mix(in srgb,var(--bg) 88%,transparent);
  backdrop-filter:saturate(180%) blur(16px);-webkit-backdrop-filter:saturate(180%) blur(16px);
}
.appbar h1{font-size:20px;font-weight:740;letter-spacing:-.3px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.appbar .ib{width:40px;height:40px;border-radius:var(--r-pill);display:grid;place-items:center;color:var(--text-2);flex:none;transition:background .2s}
.appbar .ib:active{background:var(--surface-3)}
.appbar .ib svg{width:23px;height:23px}
.appbar.with-back h1{font-size:var(--fs-h3);text-align:center}
.appbar .spacer{flex:1}

/* ===== Page padding ===== */
.page{padding:8px 18px 28px}
#app.anim .page{animation:screenIn .3s var(--ease) both;transform-origin:50% 0}
#app.anim .appbar{animation:appbarIn .3s var(--ease)}
@keyframes appbarIn{from{opacity:.7}to{opacity:1}}
@keyframes screenIn{from{opacity:.7;transform:scale(.99)}to{opacity:1;transform:none}}
#app.has-nav .page{padding-bottom:calc(var(--nav-h) + 44px + env(safe-area-inset-bottom))}
.section-h{display:flex;align-items:center;justify-content:space-between;margin:22px 2px 12px}
.section-h:first-child{margin-top:6px}
.section-h .t{font-size:var(--fs-h3);font-weight:720;letter-spacing:-.3px}
.section-h .link{color:var(--red);font-size:var(--fs-sm);font-weight:640}

/* ===== Cards ===== */
.card{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow-sm);padding:18px}
.card-flat{background:var(--surface);border-radius:var(--r-md);border:1px solid var(--border)}
.list{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow-sm);overflow:hidden}
.row{display:flex;align-items:center;gap:14px;padding:15px 18px;position:relative;transition:background .18s;text-align:left;width:100%}
.row + .row::before{content:"";position:absolute;top:0;left:62px;right:0;height:1px;background:var(--border)}
.row.no-icon + .row.no-icon::before{left:18px}
.row:active{background:var(--surface-2)}
.row .ricon{width:34px;height:34px;border-radius:11px;display:grid;place-items:center;flex:none;background:var(--red-soft);color:var(--red)}
.row .ricon svg{width:19px;height:19px}
.row .rmid{flex:1;min-width:0}
.row .rt{font-weight:560;font-size:var(--fs-body);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row .rs{font-size:var(--fs-sm);color:var(--text-2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row .rr{flex:none;color:var(--text-3);font-size:var(--fs-sm);display:flex;align-items:center;gap:8px}
.row .chev{color:var(--text-3)}
.row .chev svg{width:18px;height:18px;display:block}

/* ===== Buttons ===== */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;width:100%;
  padding:16px 20px;border-radius:var(--r-pill);font-size:var(--fs-body);font-weight:680;
  background:var(--red);color:#fff;transition:transform .12s,filter .2s,background .2s;box-shadow:var(--shadow-fab)}
.btn:active{transform:scale(.97);filter:brightness(.96)}
.btn svg{width:20px;height:20px}
.btn.sec{background:var(--surface);color:var(--text);box-shadow:var(--shadow-sm);border:1px solid var(--border)}
.btn.tint{background:var(--red-soft);color:var(--red);box-shadow:none}
.btn.ghost{background:transparent;color:var(--red);box-shadow:none}
.btn.sm{padding:11px 16px;font-size:var(--fs-sm);width:auto}
.btn.danger{background:var(--surface);color:var(--red);box-shadow:var(--shadow-sm)}
.btn[disabled]{opacity:.5;pointer-events:none}
.btn-add{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;
  padding:15px;border-radius:var(--r-pill);font-weight:660;color:#fff;background:var(--red);box-shadow:var(--shadow-fab);transition:transform .12s}
.btn-add:active{transform:scale(.98)}
.btn-add svg{width:20px;height:20px}

/* ===== Chips / segmented ===== */
.seg{display:flex;background:var(--surface-2);border-radius:var(--r-pill);padding:4px;gap:2px}
.seg button{flex:1;padding:10px 8px;border-radius:var(--r-pill);font-size:var(--fs-sm);font-weight:620;color:var(--text-2);transition:.22s var(--ease)}
.seg button.on{background:var(--red);color:#fff;box-shadow:0 2px 8px rgba(240,68,75,.32)}
[data-theme="dark"] .seg button.on{box-shadow:none}
.chiprow{display:flex;gap:8px;overflow-x:auto;padding:2px 0 4px;-ms-overflow-style:none;scrollbar-width:none}
.chiprow::-webkit-scrollbar{display:none}
.chip{flex:none;padding:9px 16px;border-radius:var(--r-pill);background:var(--surface);border:1px solid var(--border);
  font-size:var(--fs-sm);font-weight:600;color:var(--text-2);transition:.2s}
.chip.on{background:var(--red);color:#fff;border-color:var(--red)}
.badge{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:var(--r-pill);font-size:var(--fs-xs);font-weight:680}
.badge.green{background:var(--green-soft);color:var(--green-d)}
.badge.red{background:var(--red-soft);color:var(--red)}
.badge.amber{background:var(--amber-soft);color:var(--amber)}
.badge svg{width:13px;height:13px}

/* ===== Avatar ===== */
.avatar{border-radius:var(--r-pill);object-fit:cover;background:var(--surface-3);flex:none;display:grid;place-items:center;font-weight:700;color:var(--red);overflow:hidden}
.avatar.lg{width:60px;height:60px;font-size:22px}
.avatar.md{width:48px;height:48px;font-size:18px}
.avatar.sm{width:40px;height:40px;font-size:15px}
.avatar.xl{width:92px;height:92px;font-size:34px}
.avatar img{width:100%;height:100%;object-fit:cover}
</style>
</head>
<body>
<style>
/* ===== Hero child card ===== */
.hero{display:flex;align-items:center;gap:15px;padding:17px 18px;border-radius:var(--r);
  background:linear-gradient(135deg,var(--red) 0%,var(--red-l) 100%);color:#fff;box-shadow:var(--shadow-fab);position:relative;overflow:hidden}
.hero::after{content:"";position:absolute;right:-30px;top:-40px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.12)}
.hero::before{content:"";position:absolute;right:34px;bottom:-46px;width:90px;height:90px;border-radius:50%;background:rgba(255,255,255,.1)}
.hero .avatar{box-shadow:0 0 0 3px rgba(255,255,255,.35);z-index:1}
.hero .hname{font-size:21px;font-weight:740;letter-spacing:-.3px;z-index:1}
.hero .hage{opacity:.92;font-size:var(--fs-sm);margin-top:1px;z-index:1}
.hero .hmid{flex:1;min-width:0;z-index:1}
.hero .hswitch{width:38px;height:38px;border-radius:var(--r-pill);background:rgba(255,255,255,.2);display:grid;place-items:center;z-index:1;flex:none}
.hero .hswitch svg{width:20px;height:20px}

/* next vaccine card */
.next-vac{display:flex;align-items:center;gap:15px;padding:16px 18px;border-radius:var(--r);background:var(--red-soft);position:relative;overflow:hidden}
.next-vac .nv-ic{width:46px;height:46px;border-radius:14px;background:var(--red);color:#fff;display:grid;place-items:center;flex:none}
.next-vac .nv-ic svg{width:24px;height:24px}
.next-vac .nv-mid{flex:1;min-width:0}
.next-vac .nv-when{font-size:var(--fs-xs);font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.4px}
.next-vac .nv-name{font-weight:680;font-size:var(--fs-h3);margin-top:2px}
.next-vac .nv-date{font-size:var(--fs-sm);color:var(--text-2);margin-top:1px}

/* ===== Bottom nav ===== */
.bottomnav{position:fixed;left:0;right:0;bottom:0;z-index:50;display:flex;align-items:flex-end;justify-content:center;pointer-events:none}
.bottomnav .nav-inner{width:100%;max-width:var(--maxw);display:flex;align-items:stretch;justify-content:space-around;
  height:calc(var(--nav-h) + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);
  background:color-mix(in srgb,var(--surface) 90%,transparent);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
  border-top:1px solid var(--border);pointer-events:auto;position:relative}
.navitem{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--text-3);transition:color .2s;padding-top:8px}
.navitem.on{color:var(--red)}
.navitem svg{width:25px;height:25px}
.navitem span{font-size:10.5px;font-weight:620;letter-spacing:-.1px}
.navitem.spacer-fab{visibility:hidden}
.fab{position:absolute;left:50%;top:-22px;transform:translateX(-50%);width:60px;height:60px;border-radius:var(--r-pill);
  background:linear-gradient(135deg,var(--red) 0%,var(--red-l) 100%);box-shadow:var(--shadow-fab);display:grid;place-items:center;color:#fff;pointer-events:auto;transition:transform .16s var(--ease-spring)}
.fab:active{transform:translateX(-50%) scale(.92)}
.fab svg{width:30px;height:30px}

/* ===== Forms ===== */
.field{margin-bottom:14px}
.field>label{display:block;font-size:var(--fs-sm);font-weight:620;color:var(--text-2);margin:0 4px 7px}
.input{display:flex;align-items:center;gap:11px;background:var(--surface-2);border:1.5px solid transparent;border-radius:var(--r-md);padding:14px 16px;transition:border-color .2s,background .2s}
.input:focus-within{border-color:var(--red);background:var(--surface)}
.input svg.lead{width:20px;height:20px;color:var(--text-3);flex:none}
.input input,.input select,.input textarea{flex:1;width:100%;background:none;border:none}
.input textarea{resize:none;line-height:1.5;min-height:84px}
.input select{appearance:none;-webkit-appearance:none}
.input.sel{position:relative}
.input.sel::after{content:"";position:absolute;right:16px;top:50%;width:9px;height:9px;border-right:2px solid var(--text-3);border-bottom:2px solid var(--text-3);transform:translateY(-65%) rotate(45deg);pointer-events:none}
.input .suffix{color:var(--text-3);font-size:var(--fs-sm);flex:none}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.gender-pick{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.gender-pick button{padding:16px;border-radius:var(--r-md);background:var(--surface-2);border:1.5px solid transparent;display:flex;flex-direction:column;align-items:center;gap:7px;font-weight:620;color:var(--text-2);transition:.2s}
.gender-pick button.on{border-color:var(--red);background:var(--red-soft);color:var(--red)}
.gender-pick button svg{width:28px;height:28px}
.checkrow{display:flex;align-items:flex-start;gap:11px;padding:4px 2px}
.cbox{width:24px;height:24px;border-radius:7px;border:2px solid var(--border-2);flex:none;display:grid;place-items:center;transition:.18s;margin-top:1px}
.cbox.on{background:var(--red);border-color:var(--red)}
.cbox svg{width:15px;height:15px;color:#fff;opacity:0;transition:.18s}
.cbox.on svg{opacity:1}
.checkrow .cl{font-size:var(--fs-sm);color:var(--text-2);line-height:1.4}
.checkrow .cl a{color:var(--red);font-weight:600}

/* ===== Toggle switch ===== */
.switch{width:50px;height:30px;border-radius:var(--r-pill);background:var(--surface-3);position:relative;transition:background .25s var(--ease);flex:none}
.switch.on{background:var(--green)}
.switch::after{content:"";position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:50%;background:#fff;box-shadow:0 2px 5px rgba(0,0,0,.2);transition:transform .25s var(--ease-spring)}
.switch.on::after{transform:translateX(20px)}

/* ===== Modal / sheet ===== */
.scrim{position:fixed;inset:0;z-index:90;background:rgba(0,0,0,.45);opacity:0;transition:opacity .3s var(--ease);display:flex;align-items:flex-end;justify-content:center}
.scrim.show{opacity:1}
.sheet{width:100%;max-width:var(--maxw);max-height:92vh;background:var(--surface);border-radius:26px 26px 0 0;
  transform:translateY(100%);transition:transform .38s var(--ease);display:flex;flex-direction:column;overflow:hidden;padding-bottom:env(safe-area-inset-bottom)}
.scrim.show .sheet{transform:none}
.sheet.center{align-self:center;border-radius:26px;max-height:88vh;margin:0 16px;transform:scale(.94);opacity:0;transition:transform .34s var(--ease-spring),opacity .3s}
.scrim.show .sheet.center{transform:scale(1);opacity:1}
.sheet-grip{width:40px;height:5px;border-radius:3px;background:var(--border-2);margin:11px auto 4px;flex:none}
.sheet-head{display:flex;align-items:center;gap:12px;padding:8px 20px 14px;flex:none}
.sheet-head h2{flex:1;font-size:var(--fs-h2);font-weight:740;letter-spacing:-.3px}
.sheet-head .x{width:36px;height:36px;border-radius:var(--r-pill);background:var(--surface-2);display:grid;place-items:center;color:var(--text-2);flex:none}
.sheet-head .x svg{width:19px;height:19px}
.sheet-body{overflow-y:auto;padding:0 20px 20px;-webkit-overflow-scrolling:touch}
.sheet-foot{padding:14px 20px calc(16px + env(safe-area-inset-bottom));flex:none;border-top:1px solid var(--border);background:var(--surface)}

/* options list in sheet */
.opt{display:flex;align-items:center;gap:14px;padding:15px 18px;border-radius:var(--r-md);transition:background .18s;width:100%;text-align:left}
.opt:active{background:var(--surface-2)}
.opt .oi{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;flex:none;background:var(--red-soft);color:var(--red)}
.opt .oi svg{width:21px;height:21px}
.opt .ot{flex:1;font-weight:600}
.opt .ot small{display:block;font-weight:400;color:var(--text-2);font-size:var(--fs-sm)}
.opt .ock{color:var(--red)}

/* ===== Toast ===== */
#toast{position:fixed;left:50%;bottom:calc(var(--nav-h) + 30px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(20px);
  z-index:120;background:#222;color:#fff;padding:13px 20px;border-radius:var(--r-pill);font-size:var(--fs-sm);font-weight:600;
  box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:.32s var(--ease);display:flex;align-items:center;gap:9px;max-width:90%}
[data-theme="dark"] #toast{background:#3a3640}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast svg{width:18px;height:18px;color:var(--green);flex:none}

/* ===== Empty state ===== */
.empty{text-align:center;padding:40px 24px;color:var(--text-2)}
.empty .ei{width:72px;height:72px;border-radius:24px;background:var(--red-soft);color:var(--red);display:grid;place-items:center;margin:0 auto 16px}
.empty .ei svg{width:36px;height:36px}
.empty h3{font-size:var(--fs-h3);font-weight:680;color:var(--text);margin-bottom:6px}
.empty p{font-size:var(--fs-sm);line-height:1.5;max-width:280px;margin:0 auto}

/* ===== Charts ===== */
.chart-wrap{margin-top:6px}
.chart-svg{width:100%;display:block;overflow:visible}
.stat-grid{display:flex;gap:10px;margin-top:14px}
.stat{flex:1;background:var(--surface-2);border-radius:var(--r-md);padding:13px 14px}
.stat .sl{font-size:var(--fs-xs);color:var(--text-2);font-weight:600}
.stat .sv{font-size:var(--fs-h3);font-weight:740;margin-top:3px}
.stat .sv small{font-size:var(--fs-xs);font-weight:600;color:var(--text-3)}

/* ===== Onboarding ===== */
.ob{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;background:var(--bg);position:relative;overflow:hidden}
.ob-blob{position:absolute;border-radius:50%;filter:blur(8px);opacity:.5;background:radial-gradient(circle,var(--red-l),transparent 70%)}
.ob-top{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 32px 10px;text-align:center;z-index:1}
.ob-logo{width:96px;height:96px;border-radius:28px;background:var(--surface);box-shadow:var(--shadow);display:grid;place-items:center;margin-bottom:22px;animation:pop .5s var(--ease-spring)}
.ob-logo svg{width:54px;height:54px;color:var(--red)}
.ob-illu{width:200px;height:200px;border-radius:36px;margin-bottom:26px;display:grid;place-items:center;background:linear-gradient(160deg,var(--red-soft),var(--surface));box-shadow:var(--shadow)}
.ob-illu svg{width:118px;height:118px;color:var(--red)}
.ob h1{font-size:30px;font-weight:800;letter-spacing:-.8px;line-height:1.12;margin-bottom:14px}
.ob h1.brand{color:var(--red)}
.ob p{font-size:var(--fs-body);color:var(--text-2);line-height:1.5;max-width:330px}
.ob-bot{padding:18px 28px calc(26px + env(safe-area-inset-bottom));z-index:1}
.dots{display:flex;gap:8px;justify-content:center;margin-bottom:22px}
.dots i{width:7px;height:7px;border-radius:4px;background:var(--border-2);transition:.3s var(--ease)}
.dots i.on{width:24px;background:var(--red)}
.ob-skip{position:absolute;top:calc(18px + env(safe-area-inset-top));right:24px;z-index:2;color:var(--text-2);font-weight:600;font-size:var(--fs-sm)}

/* auth */
.auth-wrap{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;padding:0 26px calc(24px + env(safe-area-inset-bottom));background:var(--bg)}
.auth-top{padding-top:calc(20px + env(safe-area-inset-top));display:flex;align-items:center;height:60px}
.auth-head{text-align:center;margin:8px 0 26px}
.auth-head .al{width:64px;height:64px;border-radius:20px;background:var(--surface);box-shadow:var(--shadow-sm);display:grid;place-items:center;margin:0 auto 16px}
.auth-head .al svg{width:36px;height:36px;color:var(--red)}
.auth-head h1{font-size:27px;font-weight:780;letter-spacing:-.5px}
.auth-head p{color:var(--text-2);margin-top:6px;font-size:var(--fs-sm)}
.divider{display:flex;align-items:center;gap:14px;margin:22px 0;color:var(--text-3);font-size:var(--fs-sm)}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--border)}
.social{display:flex;gap:12px;justify-content:center}
.social button{flex:1;height:54px;border-radius:var(--r-md);background:var(--surface);border:1px solid var(--border);box-shadow:var(--shadow-sm);display:grid;place-items:center;transition:transform .12s}
.social button:active{transform:scale(.96)}
.social button svg{width:24px;height:24px}
.auth-foot{text-align:center;margin-top:20px;font-size:var(--fs-sm);color:var(--text-2)}
.auth-foot a{color:var(--red);font-weight:680}
.forgot{text-align:right;margin:-4px 4px 0}
.forgot a{color:var(--red);font-size:var(--fs-sm);font-weight:600}

/* premium */
.prem-card{border-radius:var(--r);background:linear-gradient(160deg,var(--red-soft),var(--surface));padding:26px 22px;text-align:center;box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
.prem-crown{width:66px;height:66px;border-radius:50%;background:linear-gradient(135deg,#FFD86B,#F0A93C);display:grid;place-items:center;margin:0 auto 14px;box-shadow:0 8px 20px rgba(240,169,60,.4)}
.prem-crown svg{width:34px;height:34px;color:#fff}
.prem-card h2{font-size:var(--fs-h1);font-weight:800;letter-spacing:-.5px}
.prem-card .sub{color:var(--text-2);font-size:var(--fs-sm);margin-top:4px}
.feat-list{margin:20px 0;display:flex;flex-direction:column;gap:13px;text-align:left}
.feat-list .fr{display:flex;align-items:center;gap:12px;font-weight:560;font-size:var(--fs-body)}
.feat-list .fc{width:24px;height:24px;border-radius:50%;background:var(--green-soft);color:var(--green-d);display:grid;place-items:center;flex:none}
.feat-list .fc svg{width:15px;height:15px}
.price-pick{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:18px 0}
.price-opt{border:2px solid var(--border);border-radius:var(--r-md);padding:16px 14px;text-align:center;position:relative;transition:.2s;background:var(--surface)}
.price-opt.on{border-color:var(--red);background:var(--red-soft)}
.price-opt .pp{font-size:22px;font-weight:800;letter-spacing:-.5px}
.price-opt .pper{font-size:var(--fs-xs);color:var(--text-2);margin-top:2px}
.price-opt .ptag{position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;font-size:10px;font-weight:700;padding:3px 9px;border-radius:var(--r-pill);white-space:nowrap}

/* misc */
.muted{color:var(--text-2)}
.center{text-align:center}
.warn-box{display:flex;gap:11px;background:var(--amber-soft);border-radius:var(--r-md);padding:13px 15px;margin-bottom:14px}
.warn-box svg{width:20px;height:20px;color:var(--amber);flex:none;margin-top:1px}
.warn-box p{font-size:var(--fs-sm);color:var(--text);line-height:1.45}
.warn-box.red{background:var(--red-soft)}
.warn-box.red svg{color:var(--red)}
.spin{width:22px;height:22px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.sk{background:linear-gradient(90deg,var(--surface-2) 25%,var(--surface-3) 50%,var(--surface-2) 75%);background-size:200% 100%;animation:sh 1.3s infinite;border-radius:8px}
@keyframes sh{to{background-position:-200% 0}}
.tag-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.tag{padding:6px 12px;border-radius:var(--r-pill);background:var(--red-soft);color:var(--red);font-size:var(--fs-sm);font-weight:600}
.tag.gray{background:var(--surface-2);color:var(--text-2)}
@media (prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}

/* ---------- Utils ---------- */
const $=(s,r)=>(r||document).querySelector(s);
const $$=(s,r)=>Array.from((r||document).querySelectorAll(s));
const el=document.getElementById.bind(document);
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
function num(v){ const n=parseFloat(String(v).replace(",",".")); return isNaN(n)?null:n; }
function locale(){ return ({ru:"ru-RU",en:"en-US",de:"de-DE",fr:"fr-FR",es:"es-ES",it:"it-IT",uk:"uk-UA",pl:"pl-PL"})[state.settings.lang]||"ru-RU"; }

function dateOnly(d){ const x=new Date(d); return x.toISOString().slice(0,10); }
function parseD(s){ const d=new Date(s); return isNaN(d)?null:d; }

function fmtDate(d){ const x=parseD(d); if(!x)return ""; return x.toLocaleDateString(locale(),{day:"numeric",month:"long",year:"numeric"}); }
function fmtDateShort(d){ const x=parseD(d); if(!x)return ""; return x.toLocaleDateString(locale(),{day:"numeric",month:"short"}); }
function fmtTime(d){ const x=parseD(d); if(!x)return ""; return x.toLocaleTimeString(locale(),{hour:"2-digit",minute:"2-digit"}); }
function fmtDateTime(d){ const x=parseD(d); if(!x)return ""; const n=new Date();
  const sameDay=x.toDateString()===n.toDateString();
  const yd=new Date(n); yd.setDate(yd.getDate()-1); const isYd=x.toDateString()===yd.toDateString();
  const when=sameDay?t("today"):(isYd?t("yesterday"):fmtDateShort(d));
  return when+", "+fmtTime(d);
}
function relWhen(d){ const x=parseD(d); if(!x)return ""; const n=new Date();
  if(x.toDateString()===n.toDateString())return t("today");
  const yd=new Date(n); yd.setDate(yd.getDate()-1); if(x.toDateString()===yd.toDateString())return t("yesterday");
  return fmtDateShort(d)+(x.getFullYear()!==n.getFullYear()?(" "+x.getFullYear()):"");
}

function ageMonths(dob,at){ const b=parseD(dob); if(!b)return 0; const n=at?parseD(at):new Date();
  let m=(n.getFullYear()-b.getFullYear())*12+(n.getMonth()-b.getMonth());
  if(n.getDate()<b.getDate())m--; return Math.max(0,m+ (n.getDate()-b.getDate())/30 ); }
function ageMonthsInt(dob,at){ return Math.floor(ageMonths(dob,at)); }
function ageString(dob){
  const b=parseD(dob); if(!b)return ""; const n=new Date();
  let years=n.getFullYear()-b.getFullYear(); let months=n.getMonth()-b.getMonth();
  if(n.getDate()<b.getDate())months--; if(months<0){years--;months+=12;}
  const totalM=years*12+months;
  if(totalM<1){ const days=Math.max(0,Math.floor((n-b)/864e5)); const w=Math.floor(days/7);
    return w>0? (w+" "+t("weeks_old").replace("%d ","").replace("%d","")).trim() && t("weeks_old",w) : (days+" "+t("d")); }
  if(years<1) return t("months_old",months);
  const yp=plural(years,state.settings.lang,"y");
  if(months===0) return years+" "+yp;
  return years+" "+yp+" "+months+" "+t("mo");
}
function plural(n,lang,kind){
  if(lang==="ru"||lang==="uk"){ const w=({y:["год","года","лет"],mo:["мес.","мес.","мес."],d:["дн.","дн.","дн."]})[kind];
    const a=Math.abs(n)%100,b=a%10; if(a>10&&a<20)return w[2]; if(b>1&&b<5)return w[1]; if(b===1)return w[0]; return w[2]; }
  if(kind==="y")return ({en:"y",de:"J.",fr:"an"+(n>1?"s":""),es:"a.",it:"a.",pl:n===1?"rok":"lat"})[lang]||"y";
  return t("mo");
}

function daysUntil(d){ const x=parseD(d); if(!x)return null; const n=new Date(); n.setHours(0,0,0,0); const xx=new Date(x); xx.setHours(0,0,0,0); return Math.round((xx-n)/864e5); }

/* ---------- Image resize (keep storage small) ---------- */
function pickImage(cb){
  const inp=document.createElement("input"); inp.type="file"; inp.accept="image/*";
  inp.onchange=()=>{ const f=inp.files&&inp.files[0]; if(!f){cb(null);return;}
    const r=new FileReader(); r.onload=()=>{ const img=new Image(); img.onload=()=>{
      const max=900; let{width:w,height:h}=img; if(w>max||h>max){ const k=max/Math.max(w,h); w=Math.round(w*k); h=Math.round(h*k); }
      const cv=document.createElement("canvas"); cv.width=w; cv.height=h; cv.getContext("2d").drawImage(img,0,0,w,h);
      cb(cv.toDataURL("image/jpeg",0.82));
    }; img.onerror=()=>cb(null); img.src=r.result; }; r.readAsDataURL(f);
  };
  inp.click();
}

<script>

function addMonthsFrac(dob,m){ const d=parseD(dob); if(!d)return null; const whole=Math.floor(m); const frac=m-whole;
  const x=new Date(d); x.setMonth(x.getMonth()+whole); if(frac)x.setDate(x.getDate()+Math.round(frac*30.44)); return x; }
function vacList(child){
  if(!child)return [];
  const sch=SCHEDULES[child.country||"ru"]||SCHEDULES.ru; const done=child.doneVac||{};
  const today=new Date(); today.setHours(0,0,0,0);
  return sch.map(v=>{ const due=addMonthsFrac(child.dob,v.age); const dd=new Date(due); dd.setHours(0,0,0,0);
    let status="scheduled"; if(done[v.id])status="done"; else if(dd<today)status="overdue";
    return {v,due,status,doneDate:done[v.id]||null}; });
}
function nextVaccine(child){
  const list=vacList(child).filter(x=>x.status!=="done");
  const up=list.filter(x=>x.status==="scheduled").sort((a,b)=>a.due-b.due);
  if(up.length)return up[0];
  const od=list.filter(x=>x.status==="overdue").sort((a,b)=>b.due-a.due);
  return od[0]||null;
}

function fmtAge(m){ if(m<1)return Math.round(m*30.44)+" "+t("d"); if(m<24)return t("months_old",Math.round(m)); return Math.floor(m/12)+" "+plural(Math.floor(m/12),state.settings.lang,"y"); }

    +'<div class="stat"><div class="sl">'+t("bmi")+'</div><div class="sv">'+(bmi?bmi.toFixed(1):"—")+'</div></div></div>';

      +'<div class="rmid"><div class="rt">'+(metric==="h"?(m.h?m.h+" см":"—"):(m.w?m.w+" кг":"—"))+'</div><div class="rs">'+t("months_old",ageMonthsInt(c.dob,m.date))+'</div></div>'
      +'<div class="rr">'+fmtDateShort(m.date)+'</div></div>'; });
    h+='</div>';
  }else{ h+='<div class="card-flat" style="padding:18px;text-align:center;color:var(--text-2)">'+t("no_measurements")+'</div>'; }

  h+='</div>';
  return h;
};
function growthChart(c,metric){
  const idx=metric==="h"?1:2;
  let pts=(c.measurements||[]).map(m=>({x:ageMonths(c.dob,m.date),y:metric==="h"?m.h:m.w,date:m.date})).filter(p=>p.y!=null).sort((a,b)=>a.x-b.x);
  const W=340,H=210,pl=34,pr=14,pt=24,pb=26;
  if(!pts.length){ return '<div style="height:170px;display:grid;place-items:center;color:var(--text-3);font-size:var(--fs-sm)">'+ic("growth",{style:"width:40px;height:40px;opacity:.5"})+'</div>'; }
  let xMax=Math.max(6,Math.ceil(pts[pts.length-1].x/6)*6); if(xMax<pts[pts.length-1].x)xMax+=6;
  // norm samples
  const sampleAges=[]; for(let a=0;a<=xMax;a+=Math.max(1,xMax/24))sampleAges.push(a);
  const norm=sampleAges.map(a=>({x:a,y:normAt(a,c.sex,idx)}));
  let allY=pts.map(p=>p.y).concat(norm.map(n=>n.y));
  let yMin=Math.min.apply(null,allY), yMax=Math.max.apply(null,allY); const pad=(yMax-yMin)*0.12||1; yMin-=pad; yMax+=pad;
  const X=x=>pl+(x/xMax)*(W-pl-pr); const Y=y=>pt+(1-(y-yMin)/(yMax-yMin))*(H-pt-pb);
  let g="";
  for(let i=0;i<=3;i++){ const yy=pt+i*(H-pt-pb)/3; const val=yMax-(i/3)*(yMax-yMin);
    g+='<line x1="'+pl+'" y1="'+yy.toFixed(1)+'" x2="'+(W-pr)+'" y2="'+yy.toFixed(1)+'" stroke="var(--border)" stroke-width="1"/>';
    g+='<text x="'+(pl-6)+'" y="'+(yy+3).toFixed(1)+'" text-anchor="end" font-size="9" fill="var(--text-3)">'+Math.round(val)+'</text>';
  }
  // x labels
  const ticks=[]; for(let a=0;a<=xMax;a+=(xMax<=12?3:(xMax<=24?6:12)))ticks.push(a);
  ticks.forEach(a=>{ g+='<text x="'+X(a).toFixed(1)+'" y="'+(H-8)+'" text-anchor="middle" font-size="9" fill="var(--text-3)">'+ageTick(a)+'</text>'; });
  // norm dashed
  let nd=norm.map((n,i)=>(i?"L":"M")+X(n.x).toFixed(1)+" "+Y(n.y).toFixed(1)).join(" ");
  g+='<path d="'+nd+'" fill="none" stroke="var(--text-3)" stroke-width="2" stroke-dasharray="4 4" opacity=".7"/>';
  // data line + area
  let dl=pts.map((p,i)=>(i?"L":"M")+X(p.x).toFixed(1)+" "+Y(p.y).toFixed(1)).join(" ");
  g+='<path d="'+dl+'" fill="none" stroke="var(--red)" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round"/>';
  pts.forEach(p=>{ g+='<circle cx="'+X(p.x).toFixed(1)+'" cy="'+Y(p.y).toFixed(1)+'" r="3.4" fill="var(--surface)" stroke="var(--red)" stroke-width="2.4"/>'; });
  // last callout
  const lp=pts[pts.length-1]; const cx=X(lp.x), cy=Y(lp.y); const txt=(metric==="h"?lp.y+" см":lp.y+" кг");
  const bx=Math.min(cx,W-86); const by=Math.max(pt+2,cy-34);
  g+='<g><rect x="'+bx.toFixed(1)+'" y="'+by.toFixed(1)+'" width="78" height="26" rx="8" fill="var(--red)"/>'
    +'<text x="'+(bx+8).toFixed(1)+'" y="'+(by+12).toFixed(1)+'" font-size="10" font-weight="700" fill="#fff">'+txt+'</text>'
    +'<text x="'+(bx+8).toFixed(1)+'" y="'+(by+22).toFixed(1)+'" font-size="8" fill="rgba(255,255,255,.85)">'+fmtDateShort(lp.date)+'</text></g>';
  g+='<circle cx="'+cx.toFixed(1)+'" cy="'+cy.toFixed(1)+'" r="4.2" fill="var(--red)"/>';
  return '<svg class="chart-svg" viewBox="0 0 '+W+' '+H+'" style="height:200px">'+g+'</svg>';
}
function ageTick(m){ if(m<1)return "0"; if(m<12)return Math.round(m)+" "+t("mo"); const y=m/12; const r=Math.round(y*10)/10; return (Number.isInteger(r)?r:r)+" "+plural(Math.round(y),state.settings.lang,"y"); }

<script>
/* ---- form helpers ---- */
function selectField(id,icon,opts,val,ph){
  let o=ph?('<option value="">'+esc(ph)+'</option>'):"";
  opts.forEach(op=>{ o+='<option value="'+esc(op.v)+'"'+(String(op.v)===String(val)?" selected":"")+'>'+esc(op.label)+'</option>'; });
  return '<div class="field"><div class="input">'+(icon?ic(icon,{cls:"lead"}):"")+'<select id="'+id+'">'+o+'</select>'+ic("chev",{cls:"selchev"})+'</div></div>';
}
function labeledField(label,inner){ return '<div class="field-block"><div class="field-label">'+esc(label)+'</div>'+inner+'</div>'; }

/* ---- EDIT CHILD ---- */
let editDraft=null;
function initDraft(child){
  editDraft = child ? JSON.parse(JSON.stringify({id:child.id,name:child.name,photo:child.photo||null,dob:child.dob,sex:child.sex||"m",height:child.height||"",weight:child.weight||"",blood:child.blood||"",allergies:child.allergies||"",chronic:child.chronic||"",notes:child.notes||"",country:child.country||"ru"}))
    : {id:null,name:"",photo:null,dob:"",sex:"m",height:"",weight:"",blood:"",allergies:"",chronic:"",notes:"",country:state.settings.lang==="uk"?"ua":"ru"};
}
SCREENS.editChild=function(){
  if(!editDraft) initDraft(currentChild());
  const d=editDraft; const isNew=!d.id;
  let h=appbar(isNew?t("add_child_title"):t("edit_child"),{back:true,actions:'<button class="ib" data-act="save-child" style="width:auto;padding:0 14px;color:var(--red);font-weight:700">'+t("save")+'</button>'});
  h+='<div class="page">';
  // photo
  h+='<div class="photo-pick"><div class="pp-ring" id="ecPhotoRing" data-act="pick-photo">'+avatarHTML({photo:d.photo,name:d.name||"+"},"xl")+'<div class="pp-cam">'+ic("camera")+'</div></div><div class="muted" style="font-size:var(--fs-sm)">'+t("photo_hint")+'</div></div>';
  h+=labeledField(t("child_name"), inputField("ec_name","user",t("child_name"),"text"));
  h+=labeledField(t("birthdate"), '<div class="field"><div class="input">'+ic("calendar",{cls:"lead"})+'<input id="ec_dob" type="date" value="'+esc(d.dob?dateOnly(d.dob):"")+'" max="'+dateOnly(new Date())+'"></div></div>');
  h+=labeledField(t("gender"), '<div class="seg-pick" id="ecSex"><button data-act="ec-sex" data-arg="m" class="'+(d.sex==="m"?"on":"")+'">'+ic("male")+t("male")+'</button><button data-act="ec-sex" data-arg="f" class="'+(d.sex==="f"?"on":"")+'">'+ic("female")+t("female")+'</button></div>');
  h+='<div style="display:flex;gap:12px"><div style="flex:1">'+labeledField(t("height")+", см", '<div class="field"><div class="input">'+ic("ruler",{cls:"lead"})+'<input id="ec_height" type="number" inputmode="decimal" placeholder="—" value="'+esc(d.height)+'"></div></div>')+'</div>'
    +'<div style="flex:1">'+labeledField(t("weight")+", кг", '<div class="field"><div class="input">'+ic("weight",{cls:"lead"})+'<input id="ec_weight" type="number" inputmode="decimal" placeholder="—" value="'+esc(d.weight)+'"></div></div>')+'</div></div>';
  h+=labeledField(t("blood_type"), selectField("ec_blood","drop",BLOOD_TYPES.map(b=>({v:b,label:b})),d.blood,t("not_set")));
  h+=labeledField(t("allergies"), '<div class="field"><div class="input tall" style="align-items:flex-start"><textarea id="ec_allergies" rows="2" placeholder="'+t("no_allergies")+'">'+esc(d.allergies)+'</textarea></div></div>');
  h+=labeledField(t("chronic"), '<div class="field"><div class="input tall" style="align-items:flex-start"><textarea id="ec_chronic" rows="2" placeholder="'+t("none")+'">'+esc(d.chronic)+'</textarea></div></div>');
  h+=labeledField(t("health_notes")+" ("+t("optional")+")", '<div class="field"><div class="input tall" style="align-items:flex-start"><textarea id="ec_notes" rows="2" placeholder="—">'+esc(d.notes)+'</textarea></div></div>');
  h+=labeledField(t("country"), selectField("ec_country","globe",COUNTRIES.map(c=>({v:c.c,label:nm(c)})),d.country));
  h+='<div style="height:8px"></div><button class="btn" data-act="save-child">'+ic("check")+t("save")+'</button>';
  if(!isNew){ h+='<button class="btn danger" data-act="del-child" data-id="'+d.id+'" style="margin-top:10px">'+ic("trash")+t("del")+'</button>'; }
  h+='</div>';
  return h;
};

/* ---- Sheet machinery ---- */
let sheetEl=null,scrimEl=null;
function openSheet(html){
  closeSheet(true);
  scrimEl=document.createElement("div"); scrimEl.className="scrim";
  sheetEl=document.createElement("div"); sheetEl.className="sheet";
  sheetEl.innerHTML='<div class="sheet-grab"></div><div class="sheet-scroll">'+html+'</div>';
  scrimEl.appendChild(sheetEl);
  document.body.appendChild(scrimEl);
  document.body.classList.add("sheet-open");
  scrimEl.addEventListener("click",(e)=>{ if(e.target===scrimEl) closeSheet(); });
  requestAnimationFrame(()=>{ scrimEl.classList.add("show"); });
}
function closeSheet(instant){
  if(!scrimEl){ return; }
  const sc=scrimEl; sheetEl=null; scrimEl=null;
  document.body.classList.remove("sheet-open");
  if(instant){ sc.remove(); return; }
  sc.classList.remove("show");
  setTimeout(()=>{ sc.remove(); },300);
}
function sheetHead(title){ return '<div class="sheet-head"><h3>'+esc(title)+'</h3><button class="ib" data-act="close-sheet" aria-label="'+t("close")+'">'+ic("x")+'</button></div>'; }
function val(id){ const e=el(id); return e?e.value.trim():""; }
</script>

<script>

  it:{gm:"Buongiorno",gd:"Buon pomeriggio",ge:"Buonasera",vac:"Vaccini",overview:"Panoramica",actions:"Azioni rapide",no_events:"Nessun evento in questo giorno",cal_today:"Oggi",age:"Età",docs:"Documenti"},

};
function hx(k){ const l=state.settings.lang; return (HX[l]&&HX[l][k])||HX.en[k]||HX.ru[k]||k; }
function qaTile(icon,col,bg,label,act){ return '<button class="qa" data-act="'+act+'"><div class="qa-ic" style="background:'+bg+';color:'+col+'">'+ic(icon)+'</div><div class="qa-l">'+esc(label)+'</div></button>'; }
function ringWrap(pct,size,color){
  size=size||62; pct=clamp(Math.round(pct),0,100); const stroke=Math.max(6,Math.round(size*0.12));
  const r=(size-stroke)/2, cx=size/2, circ=2*Math.PI*r, off=circ*(1-pct/100);
  return '<div class="ring-wrap" style="width:'+size+'px;height:'+size+'px">'
    +'<svg class="ring-svg" viewBox="0 0 '+size+' '+size+'" style="width:'+size+'px;height:'+size+'px;transform:rotate(-90deg)">'
    +'<circle cx="'+cx+'" cy="'+cx+'" r="'+r+'" fill="none" stroke="var(--surface-3)" stroke-width="'+stroke+'"/>'
    +'<circle cx="'+cx+'" cy="'+cx+'" r="'+r+'" fill="none" stroke="'+(color||"var(--green)")+'" stroke-width="'+stroke+'" stroke-linecap="round" stroke-dasharray="'+circ.toFixed(1)+'" stroke-dashoffset="'+off.toFixed(1)+'" style="transition:stroke-dashoffset .7s var(--ease)"/></svg>'
    +'<span class="ring-val" style="font-size:'+Math.round(size*0.27)+'px">'+pct+'%</span></div>';
}

function calEventsOn(c,iso){
  const ev=[];
  vacList(c).forEach(r=>{ if(dateOnly(r.due)===iso) ev.push({kind:"vac",rec:r}); });
  (c.diary||[]).forEach(d=>{ if(dateOnly(d.date)===iso) ev.push({kind:"diary",d:d}); });
  ev.sort((a,b)=> (a.kind==="vac"?0:1)-(b.kind==="vac"?0:1));
  return ev;
}
SCREENS.calendar=function(){
  const c=currentChild();
  let h=appbar(t("nav_calendar"),{actions:'<span class="spacer"></span><button class="ib" data-act="cal-today" aria-label="'+hx("cal_today")+'">'+ic("calendar")+'</button>'});
  if(!c){ return h+'<div class="page"><div class="card" style="padding:0"><div class="empty"><div class="ei">'+ic("baby")+'</div><h3>'+t("no_child_t")+'</h3><p>'+t("no_child_s")+'</p></div></div><div style="height:16px"></div><button class="btn" data-act="add-child">'+ic("plus")+t("add_child")+'</button></div>'; }
  const now=new Date();
  if(ui.calY==null){ ui.calY=now.getFullYear(); ui.calM=now.getMonth(); }
  if(!ui.calSel) ui.calSel=dateOnly(now);
  const y=ui.calY, m=ui.calM;
  const first=new Date(y,m,1); const lead=(first.getDay()+6)%7; const dim=new Date(y,m+1,0).getDate();
  const monthName=first.toLocaleDateString(locale(),{month:"long",year:"numeric"});
  // weekday labels (Mon-start)
  const ref=new Date(2024,0,1); let wd="";
  for(let i=0;i<7;i++){ const d=new Date(ref); d.setDate(ref.getDate()+i); wd+='<span>'+d.toLocaleDateString(locale(),{weekday:"short"}).replace(".","").slice(0,3)+'</span>'; }
  // event buckets for this month
  const buck={};
  vacList(c).forEach(r=>{ const d=r.due; if(d.getFullYear()===y&&d.getMonth()===m){ const k=dateOnly(d); (buck[k]=buck[k]||{}); if(r.status==="done")buck[k].vd=1; else buck[k].v=1; } });
  (c.diary||[]).forEach(e=>{ const d=parseD(e.date); if(d&&d.getFullYear()===y&&d.getMonth()===m){ const k=dateOnly(e.date); (buck[k]=buck[k]||{}).dy=1; } });
  const todayISO_=dateOnly(now);
  h+='<div class="page">';
  h+='<div class="cal-bar"><div class="cal-mon">'+esc(monthName)+'</div><div class="cal-btns"><button class="cal-nb" data-act="cal-prev">'+ic("back")+'</button><button class="cal-nb" data-act="cal-next">'+ic("chev")+'</button></div></div>';
  h+='<div class="cal-card"><div class="cal-wd">'+wd+'</div><div class="cal-grid">';
  for(let i=0;i<lead;i++) h+='<div class="cal-d empty"></div>';
  for(let day=1;day<=dim;day++){
    const iso=y+"-"+String(m+1).padStart(2,"0")+"-"+String(day).padStart(2,"0");
    const b=buck[iso]||{}; const cls=["cal-d"]; if(iso===todayISO_)cls.push("today"); if(iso===ui.calSel)cls.push("sel");
    let dots=""; if(b.v)dots+='<i class="cal-dot" style="background:var(--red)"></i>'; if(b.vd)dots+='<i class="cal-dot" style="background:var(--green)"></i>'; if(b.dy)dots+='<i class="cal-dot" style="background:var(--blue)"></i>';
    h+='<button class="'+cls.join(" ")+'" data-act="cal-day" data-arg="'+iso+'"><span>'+day+'</span><span class="cal-dots">'+dots+'</span></button>';
  }
  h+='</div></div>';
  // selected day events
  const ev=calEventsOn(c,ui.calSel);
  h+='<div class="section-h" style="margin-top:18px"><span class="t" style="text-transform:capitalize">'+esc(parseD(ui.calSel+"T12:00:00").toLocaleDateString(locale(),{weekday:"long",day:"numeric",month:"long"}))+'</span></div>';
  if(ev.length){
    h+='<div class="list">';
    ev.forEach(x=>{
      if(x.kind==="vac"){ const r=x.rec; const st=r.status;
        const right= st==="done"?'<span class="badge green">'+ic("check")+t("st_done")+'</span>':(st==="overdue"?'<span class="badge red">'+t("st_overdue")+'</span>':'<span class="badge amber">'+t("st_scheduled")+'</span>');
        h+='<button class="row" data-act="mark-vac" data-id="'+r.v.id+'"><div class="ricon" style="background:var(--red-soft);color:var(--red)">'+ic("syringe")+'</div><div class="rmid"><div class="rt">'+esc(nm(r.v))+'</div><div class="rs">'+t("vaccines_title")+'</div></div><div class="rr">'+right+'</div></button>';
      }else{ h+=diaryRow(x.d); }
    });
    h+='</div>';
  }else{
    h+='<div class="card-flat" style="padding:22px;text-align:center;color:var(--text-2)"><div style="opacity:.5;margin-bottom:8px">'+ic("calendar",{style:"width:30px;height:30px;display:inline-block"})+'</div>'+hx("no_events")+'</div>';
  }
  // legend
  h+='<div style="display:flex;gap:16px;justify-content:center;margin-top:16px;font-size:var(--fs-xs);color:var(--text-2)">'
    +'<span><i class="cal-dot" style="background:var(--red);display:inline-block;margin-right:5px"></i>'+hx("vac")+'</span>'
    +'<span><i class="cal-dot" style="background:var(--green);display:inline-block;margin-right:5px"></i>'+t("st_done")+'</span>'
    +'<span><i class="cal-dot" style="background:var(--blue);display:inline-block;margin-right:5px"></i>'+t("health_diary")+'</span></div>';
  h+='</div>';
  return h;
};
</script>
<script>
/* ---- Premium: Stripe (test) + strings ---- */
/* НАСТОЯЩАЯ ОПЛАТА: впиши сюда свои данные из Stripe (тестовые pk_test_… / live позже).
   Самый простой способ без сервера — Stripe Payment Links: создай 2 ссылки в дашборде
   (месяц/год) и вставь их в linkMonthly / linkYearly. Тогда кнопка «Оформить» откроет
   реальную страницу оплаты Stripe. Пока поля пустые — работает встроенная ТЕСТОВАЯ оплата. */
const STRIPE = {
  publishableKey: "",          // pk_test_... (для будущей интеграции Stripe.js / Pricing Table)
  linkMonthly: "",             // https://buy.stripe.com/test_... (месячная подписка)
  linkYearly: "",              // https://buy.stripe.com/test_... (годовая подписка)
  successParam: "subscription" // ?subscription=success вернёт Stripe после оплаты
};
const PX={
  ru:{sub:"Оформить подписку",pay:"Оплатить",paid:"Подписка оформлена!",testmode:"Тестовый режим",testcard:"Тестовая карта: 4242 4242 4242 4242, любой срок и CVC",byterms:"Оформляя подписку, вы принимаете",cardnum:"Номер карты",emailr:"Email для чека",securenote:"Оплата защищена Stripe",exp:"Срок (ММ/ГГ)",cvc:"CVC",choose:"Выберите план",best:"Выгоднее"},
  en:{sub:"Subscribe",pay:"Pay",paid:"Subscription activated!",testmode:"Test mode",testcard:"Test card: 4242 4242 4242 4242, any date & CVC",byterms:"By subscribing you accept the",cardnum:"Card number",emailr:"Email for receipt",securenote:"Payment secured by Stripe",exp:"Expiry (MM/YY)",cvc:"CVC",choose:"Choose a plan",best:"Best value"},
  de:{sub:"Abonnieren",pay:"Bezahlen",paid:"Abo aktiviert!",testmode:"Testmodus",testcard:"Testkarte: 4242 4242 4242 4242, beliebiges Datum & CVC",byterms:"Mit dem Abo akzeptierst du die",cardnum:"Kartennummer",emailr:"E-Mail für Beleg",securenote:"Zahlung gesichert durch Stripe",exp:"Gültig (MM/JJ)",cvc:"CVC",choose:"Plan wählen",best:"Günstiger"},
  fr:{sub:"S'abonner",pay:"Payer",paid:"Abonnement activé !",testmode:"Mode test",testcard:"Carte test : 4242 4242 4242 4242, date & CVC au choix",byterms:"En vous abonnant, vous acceptez les",cardnum:"Numéro de carte",emailr:"E-mail pour le reçu",securenote:"Paiement sécurisé par Stripe",exp:"Expiration (MM/AA)",cvc:"CVC",choose:"Choisissez un plan",best:"Avantageux"},
  es:{sub:"Suscribirse",pay:"Pagar",paid:"¡Suscripción activada!",testmode:"Modo de prueba",testcard:"Tarjeta de prueba: 4242 4242 4242 4242, cualquier fecha y CVC",byterms:"Al suscribirte aceptas los",cardnum:"Número de tarjeta",emailr:"Email para el recibo",securenote:"Pago protegido por Stripe",exp:"Caducidad (MM/AA)",cvc:"CVC",choose:"Elige un plan",best:"Mejor precio"},
  it:{sub:"Abbonati",pay:"Paga",paid:"Abbonamento attivato!",testmode:"Modalità test",testcard:"Carta di prova: 4242 4242 4242 4242, data e CVC a piacere",byterms:"Abbonandoti accetti i",cardnum:"Numero carta",emailr:"Email per la ricevuta",securenote:"Pagamento protetto da Stripe",exp:"Scadenza (MM/AA)",cvc:"CVC",choose:"Scegli un piano",best:"Conviene"},
  uk:{sub:"Оформити підписку",pay:"Сплатити",paid:"Підписку оформлено!",testmode:"Тестовий режим",testcard:"Тестова картка: 4242 4242 4242 4242, будь-який термін і CVC",byterms:"Оформлюючи підписку, ви приймаєте",cardnum:"Номер картки",emailr:"Email для чека",securenote:"Оплата захищена Stripe",exp:"Термін (ММ/РР)",cvc:"CVC",choose:"Оберіть план",best:"Вигідніше"},
  pl:{sub:"Subskrybuj",pay:"Zapłać",paid:"Subskrypcja aktywna!",testmode:"Tryb testowy",testcard:"Karta testowa: 4242 4242 4242 4242, dowolna data i CVC",byterms:"Subskrybując, akceptujesz",cardnum:"Numer karty",emailr:"E-mail na paragon",securenote:"Płatność zabezpieczona przez Stripe",exp:"Ważność (MM/RR)",cvc:"CVC",choose:"Wybierz plan",best:"Taniej"},
};
function px(k){ const l=state.settings.lang; return (PX[l]&&PX[l][k])||PX.en[k]||PX.ru[k]||k; }

function startCheckout(){
  const plan=ui.planPick||"yearly";
  const link = plan==="yearly"?STRIPE.linkYearly:STRIPE.linkMonthly;
  if(link){ location.href=link; return; }      // real Stripe Payment Link if configured
  openStripeTest(plan);                          // otherwise built-in test checkout
}
function openStripeTest(plan){
  const amount = plan==="yearly"?state.priceY:state.priceM;
  const period = plan==="yearly"?t("per_year"):t("per_month");
  let h='<div class="sheet-head"><h3>Stripe</h3><button class="ib" data-act="close-sheet" aria-label="'+t("close")+'">'+ic("x")+'</button></div>';
  h+='<div class="stripe-amount"><span class="sa-val">'+esc(amount)+'</span><span class="sa-per">/ '+period+'</span></div>';
  h+='<div class="stripe-test">'+ic("info")+'<span>'+px("testmode")+' · '+px("testcard")+'</span></div>';
  h+=labeledField(px("emailr"),'<div class="field"><div class="input">'+ic("mail",{cls:"lead"})+'<input id="sc_email" type="email" placeholder="mama@example.com"></div></div>');
  h+=labeledField(px("cardnum"),'<div class="field"><div class="input">'+ic("file",{cls:"lead"})+'<input id="sc_card" type="text" inputmode="numeric" placeholder="4242 4242 4242 4242"></div></div>');
  h+='<div style="display:flex;gap:12px"><div style="flex:1.3">'+labeledField(px("exp"),'<div class="field"><div class="input"><input id="sc_exp" type="text" placeholder="12 / 28"></div></div>')+'</div>'
    +'<div style="flex:1">'+labeledField(px("cvc"),'<div class="field"><div class="input"><input id="sc_cvc" type="text" inputmode="numeric" placeholder="123"></div></div>')+'</div></div>';
  h+='<button class="btn" data-act="pay-now">'+ic("lock")+px("pay")+' '+esc(amount)+'</button>';
  h+='<div class="stripe-secure">'+ic("lock",{style:"width:13px;height:13px;display:inline;vertical-align:-2px"})+' '+px("securenote")+'</div>';
  openSheet(h);
}
function activatePremium(){
  state.plan="premium"; state.trialEnd=null; save();
  closeSheet(); render();
  toast(px("paid"));
}
function checkSubscriptionReturn(){
  try{
    const q=new URLSearchParams(location.search);
    if(q.get(STRIPE.successParam)==="success"){
      state.plan="premium"; state.trialEnd=null; save();
      history.replaceState(null,"",location.pathname);
    }
  }catch(e){}
}
</script>
<script>
/* ---------- Actions ---------- */
function setActive(id){ state.activeChildId=id; }
function findChild(id){ return state.children.find(c=>c.id===id); }
function reRenderClose(msg){ closeSheet(); render(); if(msg)toast(msg); }

const ACTIONS={
  tab:(arg)=>setTab(arg),
  go:(arg)=>{ if(arg==="editChild"){ initDraft(currentChild()); } go(arg); },
  back:()=>back(),
  "cal-prev":()=>{ if(ui.calM==null){const n=new Date();ui.calY=n.getFullYear();ui.calM=n.getMonth();} ui.calM--; if(ui.calM<0){ui.calM=11;ui.calY--;} render(); },
  "cal-next":()=>{ if(ui.calM==null){const n=new Date();ui.calY=n.getFullYear();ui.calM=n.getMonth();} ui.calM++; if(ui.calM>11){ui.calM=0;ui.calY++;} render(); },
  "cal-day":(arg)=>{ ui.calSel=arg; render(); },
  "cal-today":()=>{ const n=new Date(); ui.calY=n.getFullYear(); ui.calM=n.getMonth(); ui.calSel=dateOnly(n); render(); },
  "close-sheet":()=>closeSheet(),
  profile:()=>go("profile"),
  "switch-child":()=>openSwitchChild(),
  fab:()=>{ if(!currentChild()){ ACTIONS["add-child"](); } else { openDiarySheet(); } },

  /* onboarding */
  "ob-skip":()=>{ state.onboarded=true; state.authed=true; state.obStep=0; save(); render(); },
  "ob-next":()=>{ if((state.obStep||0)<2){ state.obStep=(state.obStep||0)+1; save(); render(); } else { state.onboarded=true; state.authed=true; save(); render(); } },

  /* auth */
  "auth-mode":(arg)=>{ authMode=arg; render(); },
  "pw":(arg)=>{ const i=el(arg); if(i){ i.type=i.type==="password"?"text":"password"; } },
  "toggle-agree":()=>{ agreed=!agreed; const b=el("agreeBox"); if(b)b.classList.toggle("on",agreed); },
  "do-login":()=>{ const id=val("log_id"); if(!id){ toast(t("email_or_phone")); return; } state.user={name:state.user.name||(id.includes("@")?id.split("@")[0]:id),email:id.includes("@")?id:""}; state.authed=true; save(); render(); },
  "do-register":()=>{ const name=val("reg_name"),email=val("reg_email"); if(!agreed){ toast(t("agree")+" "+t("terms")); return; } if(!name&&!email){ toast(t("name")); return; } state.user={name:name||(email?email.split("@")[0]:"Пользователь"),email:email}; state.authed=true; save(); render(); },
  "social":(arg)=>{ state.user={name:state.user.name||(arg==="apple"?"Apple ID":arg==="google"?"Google":t("phone")),email:state.user.email||""}; state.authed=true; save(); render(); },

  /* settings */
  "set-lang":(arg)=>{ state.settings.lang=arg; save(); back(); },
  "toggle-notif":()=>{ state.settings.notif=!state.settings.notif; if(state.settings.notif&&typeof Notification!=="undefined"){ try{ Notification.requestPermission&&Notification.requestPermission(); }catch(e){} if(typeof Notification!=="undefined"&&Notification.permission==="denied"){ toast(t("enable_notif")); } } save(); render(); },
  "toggle-theme":()=>{ state.settings.theme=(effectiveTheme()==="dark")?"light":"dark"; applyTheme(); save(); render(); },
  "edit-user":()=>openEditUser(),
  "save-user":()=>{ state.user.name=val("usr_name"); state.user.email=val("usr_email"); save(); reRenderClose(t("saved")); },
  "manage-children":()=>openManageChildren(),
  "security-info":()=>openSecurity(),
  "about-info":()=>openAbout(),
  "logout":()=>openConfirm(t("logout_confirm"),"do-logout",null,true),
  "do-logout":()=>{ state.authed=false; viewStack=[]; state.currentTab="home"; save(); closeSheet(); render(); },

  /* children */
  "add-child":()=>{ if(state.children.length>=1&&state.plan==="free"){ openUpgrade(); return; } initDraft(null); closeSheet(); go("editChild"); },
  "do-switch":(arg,id)=>{ setActive(id); viewStack=[]; save(); closeSheet(); render(); },
  "edit-child-id":(arg,id)=>{ setActive(id); initDraft(findChild(id)); closeSheet(); go("editChild"); },
  "del-child":(arg,id)=>openConfirm(t("confirm_del"),"do-del-child",id,true),
  "do-del-child":(arg,id)=>{ state.children=state.children.filter(c=>c.id!==id); if(state.activeChildId===id)state.activeChildId=(state.children[0]&&state.children[0].id)||null; save(); closeSheet(); if(currentView()==="editChild")back(); render(); toast(t("deleted")); },
  "ec-sex":(arg)=>{ if(editDraft)editDraft.sex=arg; const w=el("ecSex"); if(w)$$("button",w).forEach(b=>b.classList.toggle("on",b.dataset.arg===arg)); },
  "pick-photo":()=>{ pickImage(d=>{ if(d&&editDraft){ editDraft.photo=d; const r=el("ecPhotoRing"); if(r)r.innerHTML=avatarHTML({photo:d,name:editDraft.name||"+"},"xl")+'<div class="pp-cam">'+ic("camera")+'</div>'; } }); },
  "save-child":()=>{
    if(!editDraft)return; const name=val("ec_name"); const dob=val("ec_dob");
    if(!name){ toast(t("child_name")); const e=el("ec_name"); e&&e.focus(); return; }
    if(!dob){ toast(t("birthdate")); return; }
    const h=num(val("ec_height")), w=num(val("ec_weight"));
    const fields={ name:name, photo:editDraft.photo||null, dob:new Date(dob+"T12:00:00").toISOString(), sex:editDraft.sex||"m",
      height:h||"", weight:w||"", blood:val("ec_blood"), allergies:val("ec_allergies"), chronic:val("ec_chronic"), notes:val("ec_notes"), country:val("ec_country")||"ru" };
    if(editDraft.id){ const c=findChild(editDraft.id); if(c){ Object.assign(c,fields);
        if((!c.measurements||!c.measurements.length)&&(h||w)) c.measurements=[{date:c.dob,h:h||null,w:w||null}]; }
      save(); back(); toast(t("updated")); }
    else{ const child=Object.assign({id:uid(),doneVac:{},measurements:[],docs:[],diary:[],reminders:[],emergency:{}},fields);
      if(h||w)child.measurements=[{date:child.dob,h:h||null,w:w||null}];
      state.children.push(child); state.activeChildId=child.id; save(); back(); toast(t("added")); }
    editDraft=null;
  },

  /* vaccines */
  "vac-tab":(arg)=>{ ui.vacTab=arg; render(); },
  "mark-vac":(arg,id)=>openMarkVac(id),
  "confirm-mark-vac":(arg,id)=>{ const c=currentChild(); c.doneVac=c.doneVac||{}; c.doneVac[id]=new Date((val("mv_date")||dateOnly(new Date()))+"T12:00:00").toISOString(); save(); reRenderClose(t("vac_done")); },
  "unmark-vac":(arg,id)=>{ const c=currentChild(); if(c.doneVac)delete c.doneVac[id]; save(); reRenderClose(); },
  "pick-country":()=>openCountry(),
  "set-country":(arg)=>{ const c=currentChild(); if(c)c.country=arg; save(); reRenderClose(); },

  /* growth */
  "growth-tab":(arg)=>{ ui.growthTab=arg; render(); },
  "add-measurement":()=>openMeasurement(),
  "submit-measurement":()=>{ const c=currentChild(); const h=num(val("sm_h")),w=num(val("sm_w")); const d=val("sm_date")||dateOnly(new Date());
    if(h==null&&w==null){ toast("—"); return; } c.measurements=c.measurements||[]; c.measurements.push({date:new Date(d+"T12:00:00").toISOString(),h:h,w:w});
    c.measurements.sort((a,b)=>new Date(a.date)-new Date(b.date)); const last=c.measurements[c.measurements.length-1];
    if(last.h)c.height=last.h; if(last.w)c.weight=last.w; save(); reRenderClose(t("measurement_added")); },

  /* nutrition */
  "nutri-age":(arg)=>{ ui.nutriAge=arg; render(); },

  /* meds */
  "med-detail":(arg)=>openMedDetail(arg),

  /* medcard */
  "add-document":(arg)=>openDocSheet(arg),
  "attach-doc-photo":()=>{ pickImage(d=>{ if(d){ docDraftPhoto=d; const w=el("docPhotoWrap"); if(w)w.innerHTML='<img class="doc-photo-preview" src="'+d+'" alt="">'; } }); },
  "submit-document":()=>{ const c=currentChild(); const type=val("doc_type")||"analyses"; const title=val("doc_title"); const date=val("doc_date")||dateOnly(new Date());
    c.docs=c.docs||[]; c.docs.push({id:uid(),type:type,title:title||t(type),date:new Date(date+"T12:00:00").toISOString(),photo:docDraftPhoto||null}); docDraftPhoto=null; save(); reRenderClose(t("doc_added")); },
  "view-doc":(arg,id)=>openViewDoc(id),
  "del-doc":(arg,id)=>{ const c=currentChild(); c.docs=(c.docs||[]).filter(d=>d.id!==id); save(); reRenderClose(t("deleted")); },

  /* diary */
  "add-diary":()=>{ if(!currentChild()){ ACTIONS["add-child"](); return; } openDiarySheet(); },
  "diary-type":(arg)=>openDiarySheet(arg),
  "submit-diary":()=>{ const c=currentChild(); const d=val("dy_date")||dateOnly(new Date()); const tm=val("dy_time")||"12:00";
    const entry={id:uid(),type:diaryDraftType,date:new Date(d+"T"+tm+":00").toISOString(),value:val("dy_val"),note:val("dy_note")};
    const dz=el("dy_dose"); if(dz)entry.dose=dz.value.trim();
    c.diary=c.diary||[]; c.diary.push(entry); save(); reRenderClose(t("entry_added")); },
  "open-diary":(arg,id)=>openDiaryView(id),
  "del-diary":(arg,id)=>{ const c=currentChild(); c.diary=(c.diary||[]).filter(x=>x.id!==id); save(); reRenderClose(t("deleted")); },

  /* reminders */
  "add-reminder":()=>{ if(!currentChild()){ ACTIONS["add-child"](); return; } openReminderSheet(); },
  "open-reminder":(arg,id)=>openReminderSheet(id),
  "toggle-reminder":(arg,id)=>{ const c=currentChild(); const r=(c.reminders||[]).find(x=>x.id===id); if(r){ r.on=r.on===false?true:false; save(); render(); } },
  "submit-reminder":()=>{ const c=currentChild(); const title=val("rm_title"); if(!title){ toast(t("rem_title")); return; }
    const data={title:title,type:val("rm_type")||"meds",time:val("rm_time")||"09:00",repeat:val("rm_repeat")||"daily"};
    c.reminders=c.reminders||[]; if(editingReminderId){ const r=c.reminders.find(x=>x.id===editingReminderId); if(r)Object.assign(r,data); }
    else{ c.reminders.push(Object.assign({id:uid(),on:true},data)); } editingReminderId=null; save(); reRenderClose(t("rem_added")); },
  "del-reminder":(arg,id)=>{ const c=currentChild(); c.reminders=(c.reminders||[]).filter(x=>x.id!==id); editingReminderId=null; save(); reRenderClose(t("deleted")); },
  "rem-filter":(arg)=>{ ui.remFilter=arg; render(); },

  /* emergency */
  "edit-emergency":()=>openEditEmergency(),
  "save-emergency":()=>{ const c=currentChild(); const get=(k)=>({name:val("em_"+k+"_name"),phone:val("em_"+k+"_phone")});
    c.emergency={mother:get("mother"),father:get("father"),doctor:get("doctor")}; save(); reRenderClose(t("saved")); },

  /* premium */
  "plan-pick":(arg)=>{ ui.planPick=arg; render(); },
  "subscribe":()=>{ startCheckout(); },
  "pay-now":()=>{ const card=(val("sc_card")||"").replace(/\s/g,""); if(card.length<12){ toast(px("cardnum")); const e=el("sc_card"); e&&e.focus(); return; } activatePremium(); },
  "start-trial":()=>{ state.plan="trial"; state.trialEnd=Date.now()+14*864e5; save(); render(); toast(t("trial_started")); },
  "restore-purchase":()=>{ toast(t("restore")); },
  "go-premium-sheet":()=>{ closeSheet(); go("premium"); },
};

document.body.addEventListener("click",function(e){
  const a=e.target.closest&&e.target.closest("[data-act]"); if(!a)return;
  const act=a.getAttribute("data-act"); if(!act)return;
  const fn=ACTIONS[act]; if(!fn)return;
  if(a.tagName==="A"&&a.getAttribute("href"))return; // allow tel: links
  const arg=a.getAttribute("data-arg"); const id=a.getAttribute("data-id");
  fn(arg,id,a,e);
});

/* ---------- Init ---------- */
applyTheme();
checkSubscriptionReturn();
render();
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('sw.js').catch(function () {});
  });
}
</script>
